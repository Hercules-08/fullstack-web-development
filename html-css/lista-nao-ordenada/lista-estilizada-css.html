<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="lista estilizada no CSS">
    <meta name="keywords" content="JavaScript, CSS">
    <meta name="author" content="Hercules Olimpiano">
    <title>Lista não ordenada estilizada</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <ul>
        <li>Item com marcador padrão (disc)</li>
    </ul>

    <ul class="circle">
        <li>Item com marcador de círculo</li>
    </ul>

    <ul class="square">
        <li>Item com marcador quadrado</li>
    </ul>

    <ul class="none">
        <li>Item sem marcador</li>
    </ul>

    <ul class="custom-marker">
        <li>Item com marcador de imagem</li>
    </ul>

    <ul class="spacing">
        <li>Primeiro item com espaçamento</li>
        <li>Segundo item com espaçamento</li>
        <li>Terceiro item com espaçamento</li>
    </ul>
    
</body>
</html>
