<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Criando uma estrutura basica no css com o grid">
    <meta name="keywords" content="HTML, CSS, JavaScript">
    <meta name="author" content="Jhamison Rodrigues">
    <title>Praticando css com o grid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="grid-container">
        <div class="grid-item">Item 1</div>
        <div class="grid-item">Item 2</div>
        <div class="grid-item">Item 3</div>
        <div class="grid-item">Item 4</div>
        <div class="grid-item">Item 5</div>
        <div class="grid-item">Item 6</div>
    </div>

    <div class="area-grid">
        <div class="header">Cabeçalho</div>
        <div class="sidebar">Barra lateral</div>
        <div class="content">Conteúdo principal</div>
        <div class="footer">Rodapé</div>
    </div>
    
</body>
</html>
