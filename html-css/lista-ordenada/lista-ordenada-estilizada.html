<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Site com uma lista ordenada">
    <meta name="keywords" content="JavaScrip, CSS, lista ordenada">
    <meta name="author" content="Jhamison Rodrigues">
    <title>lista ordenada e estilizada</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <ol>
        <li>Item com numeração decimal (1, 2, 3)</li>
    </ol>
    <ol class="lower-alpha">
        <li>Item com letras minúsculas (a, b, c)</li>
    </ol>
    <ol class="upper-alpha">
        <li>Item com letras maiúsculas (A, B, C)</li>
    </ol>
    <ol class="lower-roman">
        <li>Item com números romanos minúsculos (i, ii, iii)</li>
    </ol>
    <ol class="upper-roman">
        <li>Item com números romanos maiúsculos (I, II, III)</li>
    </ol>

</body>
</html>
