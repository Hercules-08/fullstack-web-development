<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Estilizando com transição no CSS">
    <meta name="keywords" content="JavaScript, CSS, HTML">
    <meta name="author" content="Jhamison Rodrigues">
    <title>Transição no CSS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <form>
        <label for="nome">Nome:</label>
        <input type="text" name="nome" id="nome" placeholder="Insira o seu nome completo">

        <label for="email">Email</label>
        <input type="email" name="email" id="email" placeholder="Insira o seu email">

        <label for="password">Password</label>
        <input type="password" name="password" id="password" placeholder="Insira uma senha com 8 characteres">

        <label for="button">Enviar</label>
        <input type="button" value="button">
    </form>
    
</body>
</html>
