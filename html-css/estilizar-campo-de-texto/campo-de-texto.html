<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Como estilizar o campo de texto em CSS">
    <meta name="keywords" content="JavaScript, CSS, HTML">
    <meta name="author" content="Jhamison Rodrigues">
    <title>Estilizando campo de texto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <form action="" method="post">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome">
        <label for="email">Email:</label>
        <input type="email" name="email" id="email">
        <label for="password">Password</label>
        <input type="password" name="password" id="password">

        <button type="submit">Enviar</button>
    </form>

    <form>
        <label for="opcao1">Opção 1</label>
        <input type="checkbox" name="opcao1" id="opcao1">

        <label for="opcao2">Opção 2</label>
        <input type="checkbox" name="opcao2" id="opcao2">

        <label for="opcao3">Opção 3</label>
        <input type="checkbox" name="opcao3" id="opcao3">

        <label for="radio1">Radio 1</label>
        <input type="radio" name="radio1" id="radio1">

        <label for="radio2">Radio 2</label>
        <input type="radio" name="radio2" id="radio2">

        <label for="radio3">Radio 3</label>
        <input type="radio" name="radio3" id="radio3">
    </form>

    <form>
        <label for="opcoes">Escolha uma opção:</label>
        <select name="opcoes" id="opcoes">
            <option value="1">Opção 1</option>
            <option value="2">Opção 2</option>
            <option value="3">Opção 3</option>
        </select>
    </form>

    <form>
        <label for="mensagem">Mensagem:</label>
        <textarea name="mensagem" id="mensagem"></textarea>
    </form>
    
</body>
</html>
