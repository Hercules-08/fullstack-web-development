<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Criando uma estrutura responsiva com grid no css">
    <meta name="keywords" content="HTML, CSS, JavaScript">
    <meta name="author" content="Jhamison Rodrigues">
    <title>Exercicio - grid css e design responsivo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="grid-container">
    <header>
        <div class="imagem">
            <img src="midias/cuts_blinders_watermark_150x150_optimized.png" alt="Logo do site">
        </div>
    <h1>Titulo do Site</h1>
</header>

<nav class="navbar">
    <ul>
        <li><a href="#home">Home</a></li>
        <li><a href="#sobre">Sobre</a></li>
        <li><a href="#servico">Serviços</a></li>
        <li><a href="#contato">Contatos</a></li>
    </ul>
</nav>
    
    <main>

        <article>
            <h1>Este é o artigo</h1>
            <p>Um paragrafo do artigo</p>
        </article>

        <section class="galeria">
            <div class="grid-item">Imagem 1</div>
            <div class="grid-item">Imagem 2</div>
            <div class="grid-item">Imagem 3</div>
            <div class="grid-item">Imagem 4</div>
            <div class="grid-item">Imagem 5</div>
        </section>

    </main>
        
        <aside>
            <ol>
                <li>Recurso 1</li>
                <li>Recurso 2</li>
                <li>Recurso 3</li>
            </ol>
        </aside>
        
        <footer>Produzido por Anonymous &copy;Loading Software</footer>

</div>
