    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<body>

    <header>
        <div class="logo-container">
            <a href="index.html">
                <img class="logo" src="../home-page-projeto1/imagens/logo.png" alt="Logo da Poison Geek">

        <nav class="navbar__header">
            <a class="link-nav__header" href="index.html">Home</a>

        </nav>
    </header>

    <main>

        <section class="contacto-section">
            <h1>Contactos</h1>
            <form>
                <label for="name">Nome</label>
                <input type="text" name="name" id="name" placeholder="Nome" required>
                <label for="email">Email</label>
                <input type="email" name="email" id="email" placeholder="Email" required>
                <label for="mensagem">Mensagem</label>
                <textarea name="mensagem" id="mensagem" placeholder="Escreva sua mensagem"></textarea>
                
                <button type="submit">Enviar</button>
            </form>
        </section>

        <section class="map-section">
            <h2>Empresa</h2>
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d47776.19619932082!2d-8.452620671739776!3d41.54733173497428!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0xd24febc6cf5d867%3A0xbc5d054162d1e218!2sBraga!5e0!3m2!1spt-PT!2spt!4v1774527101448!5m2!1spt-PT!2spt" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
